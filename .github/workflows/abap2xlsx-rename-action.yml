name: abap2xlsx-rename

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rename-abap2xlsx:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mirror and rename abap2xlsx
        uses: abap2xlsx/abap2xlsx-rename-action@main
        with:
          folder: src/abap2xlsx
          patterns: >
            [
              {
                "type": "CLAS|INTF",
                "oldName": "z(cl|if|cx)_excel",
                "newName": "z$1_yyxls"
              },
              {
                "type": "DTEL|DOMA|TABL|TTYP",
                "oldName": "zexcel_",
                "newName": "zyyxls_"
              },
              {
                "type": "MSAG",
                "oldName": "zabap2xlsx",
                "newName": "zyyxls2msg"
              }
            ]

      - name: Commit renamed files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/abap2xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "rename abap2xlsx objects"
            git push
          fi
